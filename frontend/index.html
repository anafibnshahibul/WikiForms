  <script>
  if (!HTMLScriptElement.supports || !HTMLScriptElement.supports('speculationrules')) {
    const preloadedUrls = {};
    function pointerenterHandler() {
      if (!preloadedUrls[this.href]) {
        preloadedUrls[this.href] = true;
        const prefetcher = document.createElement('link');
        prefetcher.as = prefetcher.relList.supports('prefetch') ? 'document' : 'fetch';
        prefetcher.rel = prefetcher.relList.supports('prefetch') ? 'prefetch' : 'preload';
        prefetcher.href = this.href;
        document.head.appendChild(prefetcher);
      }
    }
    document.querySelectorAll('a[href^="/"]').forEach(item => {
      item.addEventListener('pointerenter', pointerenterHandler);
    });
  }
  </script>

  <style>
    #root:empty {
      display: none;
    }
  </style>

  <style>
    :root {
      --wiki-blue: #3366cc;
      --wiki-green: #00af89;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #f8f9fa;
    }

    #app-preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #app-preloader.loaded {
      opacity: 0;
      visibility: hidden;
    }

    .loader-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100px;
      height: 100px;
    }

    .animated-ring {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--wiki-blue);
      border-bottom: 4px solid var(--wiki-green);
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
    }

    .loader-logo {
      position: absolute;
      width: 42px;
      height: 42px;
      z-index: 10;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 25px;
      font-size: 15px;
      color: #202122;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
  </style>

<body data-app-version="1.2.0" data-framework="react" data-platform="web">
  
  <div id="app-preloader">
    <div class="loader-container">
      <div class="animated-ring"></div>
      <svg class="loader-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 3C4.34315 3 3 4.34315 3 6V26C3 27.6569 4.34315 29 6 29H26C27.6569 29 29 27.6569 29 26V6C29 4.34315 27.6569 3 26 3H6Z" fill="#3366cc" />
        <path d="M9 10L12 21L15 13L18 21L21 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="23" cy="23" r="5" fill="#00af89" />
        <path d="M21 23L22.5 24.5L25 21.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <div class="loading-text">Starting WikiForms...</div>
  </div>

  <div id="offline-indicator" style="display: none; position: fixed; bottom: 0; left: 0; width: 100%; width: -webkit-fill-available; background: #d33; color: white; text-align: center; padding: 10px; font-weight: bold; z-index: 99999;">
    ⚠️ You are currently offline. Your progress might not be saved!
  </div>

  <noscript>
    <div style="text-align: center; padding: 50px; font-family: sans-serif;">
      <h2>JavaScript Required</h2>
      <p>This website requires JavaScript to work properly. Please enable it in your browser settings.</p>
    </div>
  </noscript>

  <div id="app-live-announcer" aria-live="assertive" aria-atomic="true" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">
    WikiForms is loading, please wait.
  </div>

  <div id="root"></div>

  <div id="react-crash-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 99999; padding: 40px; font-family: sans-serif;">
    <h2 style="color: #d33;">Oops! Something went wrong.</h2>
    <p>The application crashed unexpectedly. Please try refreshing the page.</p>
    <button onclick="window.location.reload()" style="background: #3366cc; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">Reload WikiForms</button>
  </div>

  <script type="module">
    function hideLoader() {
      const preloader = document.getElementById('app-preloader');
      if (preloader && !preloader.classList.contains('loaded')) {
        preloader.classList.add('loaded');
        setTimeout(() => preloader.remove(), 400); 
      }
    }

    window.addEventListener('load', hideLoader);
    setTimeout(hideLoader, 1000);

    window.addEventListener('online', () => document.getElementById('offline-indicator').style.display = 'none');
    window.addEventListener('offline', () => document.getElementById('offline-indicator').style.display = 'block');
  </script>

  <script type="module">
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (window.performance && window.performance.timing) {
          const p = window.performance.timing;
          const loadTime = p.loadEventEnd - p.navigationStart;
          console.log(`%c🚀 WikiForms Loaded in: ${loadTime}ms`, "color: #3366cc; font-weight: bold;");
        }
      }, 0);
    });
  </script>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    setTimeout(function() {
      var el = document.getElementById('app-preloader');
      if (el) {
        el.style.transition = 'opacity 0.3s ease';
        el.style.opacity = '0';
        setTimeout(function() { el.style.display = 'none'; }, 300);
      }
    }, 1000);
  </script>
